<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin : Library</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <div class="logo">
            <div class="divider"></div>
            <div class="divider"></div>
            <div class="divider"></div>
            <div class="divider"></div>
            <div class="divider"></div>
        </div>
        <h1 class="letters">LIBRARY</h1>
        <button class="new-book">New Book</button>
    </header>
    <dialog id="dialog" closedby="any">
        <div id="close" class="close-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <title>close</title>
                <path
                    d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
            </svg>
        </div>
        <form id="add-book" action="" method="dialog">
            <h2>Enter the book details:</h2>
            <div>
                <label for="title">Book Title</label>
                <input type="text" name="title" id="title" placeholder="Entropy and Art" required>
            </div>
            <div>
                <label for="author">Book Author</label>
                <input type="text" name="author" id="author" placeholder="Rudolf Arnheim" required>
            </div>
            <div>
                <label for="genre">Book Genre</label>
                <input type="text" name="genre" id="genre" placeholder="Psychology" required>
            </div>
            <div>
                <label for="pages">Number of Pages</label>
                <input type="number" name="pages" id="pages" placeholder="320" required>
            </div>
            <div>
                <input type="checkbox" name="read" id="read" >
                <label for="read">Have you read this book?</label>
            </div>
            <div>
                <button id="add" type="submit">Add Book</button>
            </div>
        </form>
    </dialog>
    <div class="bookshelf">
    </div>
</body>
<script src="script.js"></script>
<!-- <script src="https://cdn.jsdelivr.net/npm/rampensau/dist/rampensau.min.js"></script> -->

</html>
