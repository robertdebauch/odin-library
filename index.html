<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin : Library</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>Library</h1>
        <p>There will be a demo project here that allows you to view, add and delete books.</p>
    </header>
    <div class="bookshelf">
        <div class="book-entry">
            <div class="readStatus">not read yet</div>
            <div class="frame">
                <div class="picture"></div>
            </div>
            <div class="bookinfo">
                <div class="secondary-info">
                    <div class="book genre">genre</div>
                    <div class="book pages">pages: 32</div>
                </div>
                <div class="primary-info">
                    <h3 class="book title">Poetry Seeing #1</h3>
                    <p class="book author">Takahiro Kurashima</p>
                </div>
            </div>
        </div>
        <!-- one is for test, others is for layout : delete later -->
    </div>
</body>
<script src="script.js"></script>

</html>
